name: Build and Deploy Docker Image on Dev

on:
  push:
    branches:
      - dev-integrate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create $SENOTYPE_EDITOR_VERSION
        run: |
          export SENOTYPE_EDITOR_VERSION=$(tr -d "\n\r" < ../VERSION | xargs)
          echo "SENOTYPE_EDITOR_VERSION=$SENOTYPE_EDITOR_VERSION" >> $GITHUB_ENV
        working-directory: ./docker

#      - name: Set AWS Log Group
#        run: |
#          export SENOTYPE_EDITOR_CLOUDWATCH_LOG_GROUP="/aws/ec2/sennet-dev/senotype_editor/next-server"
#          echo "SENOTYPE_EDITOR_CLOUDWATCH_LOG_GROUP=SENOTYPE_EDITOR_CLOUDWATCH_LOG_GROUP" >> $GITHUB_ENV

      - name: Make build script executable
        run: chmod +x ./docker-development.sh
        working-directory: ./docker

      - name: Run the Docker build shell script
        run: ./docker-development.sh build
        working-directory: ./docker

      - name: Tag the Docker Image
        # Alternatively we could use ${{ github.sha }} instead of latest
        run: docker image tag sennet/senotype-editor:$SENOTYPE_EDITOR_VERSION sennet/senotype-editor-dev:latest
        working-directory: ./docker

      - name: Push the Docker image
        run: docker push sennet/senotype-editor-dev:latest
        working-directory: ./docker

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get GitHub runner public IP
        id: runner_ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $IP"
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install @aws-sdk/client-ec2

      - name: Modify security group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:  us-east-1
          SECURITY_GROUP_ID: sg-0ddfcbe0a83a5266c
          PORT: 22
          RUNNER_IP: ${{ steps.runner_ip.outputs.ip }}
          MODE: authorize
        run: node $GITHUB_WORKSPACE/.github/scripts/update-security-group.mjs

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: '${{ secrets.REMOTE_HOST }}'
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          use_insecure_cipher: true
          script: |
            # Change to codcc user on server
            sudo su - codcc -c "cd /opt/sennet/senotype_editor/docker/; git pull; docker pull sennet/senotype-editor-dev:latest; ./docker-development.sh down; ./docker-development.sh start;"

      - name: Remove runner IP from security group
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:  us-east-1
          SECURITY_GROUP_ID: sg-0ddfcbe0a83a5266c
          PORT: 22
          RUNNER_IP: ${{ steps.runner_ip.outputs.ip }}
          MODE: revoke
        run: node $GITHUB_WORKSPACE/.github/scripts/update-security-group.mjs